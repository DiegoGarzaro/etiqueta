# Serves the built PWA and reverse-proxies the API and uploaded media
# to the backend container. Single entrypoint on port 80.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow phone-sized photo uploads.
    client_max_body_size 25m;

    # Docker's embedded DNS, so "backend" is re-resolved if its IP changes.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
    }

    # Serve the web app manifest with its correct content type.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # The service worker and shell must not be cached by the browser.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: unknown paths return the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
